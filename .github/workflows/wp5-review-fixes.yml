name: Apply WP5 review fixes

on:
  push:
    branches: ["agent/wp5-system-check"]
    paths:
      - ".github/workflows/wp5-review-fixes.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/wp5-system-check

      - name: Apply checker soundness fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path("sel4-microkernel/tools/system-check")
          checker = root / "src/checker.rs"
          source = checker.read_text()

          source = source.replace(
              "    pub protected_procedure: bool,\n",
              "",
              1,
          )
          source = source.replace(
              "    pub no_pp_to: Vec<NoPpTo>,\n",
              "    pub no_pp_to: Vec<NoPpTo>,\n    pub mapping_perms: Vec<MappingPerms>,\n",
              1,
          )
          source = source.replace(
              "            no_pp_to: Vec::new(),\n",
              "            no_pp_to: Vec::new(),\n            mapping_perms: Vec::new(),\n",
              1,
          )
          anchor = '''#[derive(Debug, Clone, Deserialize)]
          #[serde(deny_unknown_fields)]
          pub struct DmaCapable {
              pub pd: String,
          }
          '''
          replacement = '''#[derive(Debug, Clone, Deserialize)]
          #[serde(deny_unknown_fields)]
          pub struct MappingPerms {
              pub pd: String,
              pub region: String,
              pub perms: String,
          }

          #[derive(Debug, Clone, Deserialize)]
          #[serde(deny_unknown_fields)]
          pub struct DmaCapable {
              pub pd: String,
          }
          '''
          if anchor not in source:
              raise SystemExit("MappingPerms insertion anchor not found")
          source = source.replace(anchor, replacement, 1)

          old_edges = '''        let left = &channel.ends[0];
                  let right = &channel.ends[1];
                  if is_pp_server(&graph, left) {
                      graph.pp_edges.insert((right.pd.clone(), left.pd.clone()));
                  }
                  if is_pp_server(&graph, right) {
                      graph.pp_edges.insert((left.pd.clone(), right.pd.clone()));
                  }
          '''
          new_edges = '''        let left = &channel.ends[0];
                  let right = &channel.ends[1];
                  // Microkit 2.1 defines pp=\"true\" on a channel end as
                  // authority for that end's PD to invoke the opposite end.
                  if left.protected_procedure {
                      graph.pp_edges.insert((left.pd.clone(), right.pd.clone()));
                  }
                  if right.protected_procedure {
                      graph.pp_edges.insert((right.pd.clone(), left.pd.clone()));
                  }
          '''
          if old_edges not in source:
              raise SystemExit("PP edge block not found")
          source = source.replace(old_edges, new_edges, 1)
          source = source.replace(
              "            protected_procedure: parse_bool(node.attribute(\"pp\")),\n",
              "",
              1,
          )
          start = source.find("fn is_pp_server(")
          if start == -1:
              raise SystemExit("is_pp_server not found")
          end = source.find("\npub fn parse_properties", start)
          if end == -1:
              raise SystemExit("is_pp_server end not found")
          source = source[:start] + source[end+1:]

          perms_anchor = '''    for rule in &properties.no_pp_to {
                  require_pd(graph, &rule.pd, "no_pp_to", &mut violations);
                  require_pd(graph, &rule.target, "no_pp_to", &mut violations);
                  if graph
                      .pp_edges
                      .contains(&(rule.pd.clone(), rule.target.clone()))
                  {
                      violations.push(Violation::new(
                          "no_pp_to",
                          format!(
                              "PD {} can invoke {} by protected procedure",
                              rule.pd, rule.target
                          ),
                      ));
                  }
              }

          '''
          perms_block = perms_anchor + '''    for rule in &properties.mapping_perms {
                  require_pd(graph, &rule.pd, "mapping_perms", &mut violations);
                  require_region(graph, &rule.region, "mapping_perms", &mut violations);
                  if let Some(pd) = graph.pds.get(&rule.pd) {
                      let matches: Vec<_> = pd
                          .mappings
                          .iter()
                          .filter(|mapping| mapping.region == rule.region)
                          .collect();
                      if matches.len() != 1 {
                          violations.push(Violation::new(
                              "mapping_perms",
                              format!(
                                  "PD {} has {} mappings of region {}, expected exactly one",
                                  rule.pd,
                                  matches.len(),
                                  rule.region
                              ),
                          ));
                      } else if matches[0].perms != rule.perms {
                          violations.push(Violation::new(
                              "mapping_perms",
                              format!(
                                  "PD {} maps region {} with perms {}, expected {}",
                                  rule.pd, rule.region, matches[0].perms, rule.perms
                              ),
                          ));
                      }
                  }
              }

          '''
          if perms_anchor not in source:
              raise SystemExit("mapping perms validation anchor not found")
          source = source.replace(perms_anchor, perms_block, 1)

          old_dma = '''        let dma_regions: Vec<_> = pd
                      .mappings
                      .iter()
                      .filter(|mapping| {
                          graph
                              .regions
                              .get(&mapping.region)
                              .is_some_and(|region| region.phys_addr.is_some())
                              && dma_like_region(&mapping.region)
                      })
                      .map(|mapping| mapping.region.clone())
                      .collect();
          '''
          new_dma = '''        // Conservative authority rule: any PD that maps physical
                  // memory is device-capable and must be named explicitly. This avoids
                  // security decisions based on mutable region names.
                  let dma_regions: Vec<_> = pd
                      .mappings
                      .iter()
                      .filter(|mapping| {
                          graph
                              .regions
                              .get(&mapping.region)
                              .is_some_and(|region| region.phys_addr.is_some())
                      })
                      .map(|mapping| mapping.region.clone())
                      .collect();
          '''
          if old_dma not in source:
              raise SystemExit("DMA block not found")
          source = source.replace(old_dma, new_dma, 1)
          start = source.find("fn dma_like_region(")
          if start == -1:
              raise SystemExit("dma_like_region not found")
          end = source.find("\npub fn check_text", start)
          if end == -1:
              raise SystemExit("dma_like_region end not found")
          source = source[:start] + source[end+1:]

          # Make src/lib.rs the single source of truth and remove the stale file.
          (root / "src/lib.rs").write_text(source)
          checker.unlink()

          cargo = (root / "Cargo.toml").read_text()
          cargo = cargo.replace('\n[lib]\npath = "src/checker.rs"\n', '')
          cargo = cargo.replace('roxmltree = "0.20"', 'roxmltree = "=0.20.0"')
          cargo = cargo.replace('serde = { version = "1",', 'serde = { version = "=1.0.219",')
          cargo = cargo.replace('toml = "0.8"', 'toml = "=0.8.23"')
          cargo = cargo.replace('walkdir = "2"', 'walkdir = "=2.5.0"')
          cargo = cargo.replace('pretty_assertions = "1"', 'pretty_assertions = "=1.4.1"')
          (root / "Cargo.toml").write_text(cargo)

          tests = (root / "tests/checker.rs").read_text()
          tests = tests.replace(
              '<protection_domain name="policy" priority="150" pp="true">',
              '<protection_domain name="policy" priority="150">',
          )
          tests = tests.replace(
              '<channel><end pd="worker" id="1"/><end pd="policy" id="1"/></channel>',
              '<channel><end pd="worker" id="1" pp="true"/><end pd="policy" id="1"/></channel>',
          )
          tests = tests.replace(
              '[[dma_capable]]\npd = "network"\n',
              '[[dma_capable]]\npd = "policy"\n\n[[dma_capable]]\npd = "network"\n\n[[mapping_perms]]\npd = "worker"\nregion = "work_ring"\nperms = "rw"\n',
          )
          tests = tests.replace(
              'VALID_PROPS.replace("[[dma_capable]]\\npd = \\"network\\"\\n", "")',
              'VALID_PROPS.replace("[[dma_capable]]\\npd = \\"network\\"\\n", "")',
          )
          insertion = '''
          #[test]
          fn widened_permissions_are_rejected() {
              let widened = BASE.replace(
                  "<map mr=\"work_ring\" vaddr=\"0x5000\" perms=\"rw\" />\n    </protection_domain>",
                  "<map mr=\"work_ring\" vaddr=\"0x5000\" perms=\"rwx\" />\n    </protection_domain>",
              );
              let error = check_text(&widened, VALID_PROPS).unwrap_err();
              assert!(error.to_string().contains("mapping_perms"));
          }

          #[test]
          fn physical_authority_does_not_depend_on_region_name() {
              let xml = BASE
                  .replace("net_dma", "pkt_buf")
                  .replace("<map mr=\"pkt_buf\"", "<map mr=\"pkt_buf\"");
              let properties = VALID_PROPS
                  .replace("[[dma_capable]]\npd = \"network\"\n", "")
                  .replace("net_dma", "pkt_buf");
              let error = check_text(&xml, &properties).unwrap_err();
              assert!(error.to_string().contains("dma_capable"));
          }
          '''
          marker = '\n#[test]\nfn property_path_appends_sidecar_suffix()'
          if marker not in tests:
              raise SystemExit("test insertion marker not found")
          tests = tests.replace(marker, insertion + marker, 1)
          (root / "tests/checker.rs").write_text(tests)

          readme = (root / "README.md").read_text()
          readme = readme.replace(
              '[[no_pp_to]]\npd = "worker"\ntarget = "keystore"\n\n[[dma_capable]]',
              '[[no_pp_to]]\npd = "worker"\ntarget = "keystore"\n\n[[mapping_perms]]\npd = "worker"\nregion = "work_ring"\nperms = "rw"\n\n[[dma_capable]]',
          )
          readme = readme.replace(
              'A region with `phys_addr` is classified as device/physical memory. The checker\nrequires explicit `dma_capable` declarations when a PD maps a physical region\nwhose name identifies a common DMA-capable class (`dma`, `virtio`, `genet`,\n`sdio`, `usb`, `ethernet`, or `pcie`). This is intentionally conservative and\nkeeps the DMA trust boundary visible in review.',
              '`mapping_perms` requires exactly one mapping of the named region and an exact\npermission string, so `rw` to `rwx` widening is rejected.\n\nA region with `phys_addr` is classified as device/physical memory. The checker\nconservatively requires every PD mapping physical memory to be declared\n`dma_capable`. This deliberately over-approximates DMA authority rather than\nbasing a security decision on region-name substrings.',
          )
          (root / "README.md").write_text(readme)

          workflow = Path(".github/workflows/system-check.yml")
          wf = workflow.read_text().replace(
              '      - name: Install Rust\n        uses: dtolnay/rust-toolchain@stable',
              '      - name: Install pinned Rust nightly\n        uses: dtolnay/rust-toolchain@master\n        with:\n          toolchain: nightly-2026-07-02',
          )
          workflow.write_text(wf)

          Path(".github/workflows/wp5-review-fixes.yml").unlink()
          PY

      - name: Format and test
        run: |
          rustup toolchain install nightly-2026-07-02 --profile minimal
          rustup override set nightly-2026-07-02
          cargo fmt --manifest-path sel4-microkernel/tools/system-check/Cargo.toml
          cargo test --manifest-path sel4-microkernel/tools/system-check/Cargo.toml --all-targets

      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "wp5: address authority checker review"
          git push origin HEAD:agent/wp5-system-check
