name: TPM Transport

on:
  push:
    branches: [main, "agent/*", "claude/*"]
    paths:
      - "sel4-microkernel/rpi4-tpm-boot/**"
      - ".github/workflows/tpm-transport.yml"
  pull_request:
    branches: [main]
    paths:
      - "sel4-microkernel/rpi4-tpm-boot/**"
      - ".github/workflows/tpm-transport.yml"

jobs:
  transport:
    name: SPI, CRB, and command tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Rust nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-07-02

      - name: Build no_std library
        run: |
          set -o pipefail
          cargo build --manifest-path sel4-microkernel/rpi4-tpm-boot/Cargo.toml \
            2>&1 | tee tpm-transport-build.log

      - name: Run host transport tests
        run: |
          set -o pipefail
          cargo test --manifest-path sel4-microkernel/rpi4-tpm-boot/Cargo.toml --features std \
            2>&1 | tee tpm-transport-tests.log

      - name: Upload transport logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tpm-transport-logs
          path: tpm-transport-*.log
          if-no-files-found: warn
