name: Apply WP7 source fix

on:
  push:
    branches: ["agent/wp7-tpm-transport"]
    paths:
      - ".github/workflows/wp7-source-fix.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/wp7-tpm-transport

      - name: Patch FIFO response reads
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("sel4-microkernel/rpi4-tpm-boot/src/slb9670.rs")
          source = path.read_text()
          old = '''        // Read response
                  self.buffer_pos = 0;
                  unsafe {
                      // Read header first (10 bytes minimum)
                      self.tis_read_fifo(&mut self.buffer[0..10]);

                      // Parse response size from header
                      let size = u32::from_be_bytes([
                          self.buffer[2],
                          self.buffer[3],
                          self.buffer[4],
                          self.buffer[5],
                      ]) as usize;

                      if size > 10 && size <= self.buffer.len() {
                          self.tis_read_fifo(&mut self.buffer[10..size]);
                      }

                      self.buffer_pos = size;
                  }
          '''
          new = '''        // Read response. The FIFO helper borrows the device, so read one
                  // byte into a temporary before storing it in the owned response
                  // buffer. The underlying TIS implementation already performs one SPI
                  // transaction per byte; this only makes the borrow boundaries
                  // explicit and avoids aliasing `self` with `self.buffer`.
                  self.buffer_pos = 0;
                  unsafe {
                      for index in 0..10 {
                          let mut byte = [0u8; 1];
                          self.tis_read_fifo(&mut byte);
                          self.buffer[index] = byte[0];
                      }

                      // Parse response size from header
                      let size = u32::from_be_bytes([
                          self.buffer[2],
                          self.buffer[3],
                          self.buffer[4],
                          self.buffer[5],
                      ]) as usize;

                      if size > 10 && size <= self.buffer.len() {
                          for index in 10..size {
                              let mut byte = [0u8; 1];
                              self.tis_read_fifo(&mut byte);
                              self.buffer[index] = byte[0];
                          }
                      }

                      self.buffer_pos = size;
                  }
          '''
          if old not in source:
              raise SystemExit("expected execute_command response block was not found")
          path.write_text(source.replace(old, new))
          Path(".github/workflows/wp7-source-fix.yml").unlink()
          PY

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sel4-microkernel/rpi4-tpm-boot/src/slb9670.rs .github/workflows/wp7-source-fix.yml
          git commit -m "wp7: separate FIFO reads from response buffer borrows"
          git push origin HEAD:agent/wp7-tpm-transport
