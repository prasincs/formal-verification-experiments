name: Apply WP6 std error traits

on:
  push:
    branches: ["agent/wp6-verified-inference"]
    paths:
      - ".github/workflows/wp6-error-traits.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/wp6-verified-inference

      - name: Add std-only Error implementations
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("sel4-microkernel/rpi4-llm/src/lib.rs")
          source = path.read_text()
          source = source.replace(
              "#![no_std]\n\nuse core::fmt;",
              "#![no_std]\n\n#[cfg(feature = \"std\")]\nextern crate std;\n\nuse core::fmt;",
              1,
          )
          source = source.replace(
              '''impl fmt::Display for ModelBuildError {
              fn fmt(&self, f: &mut fmt::Formatter<'_>) -> fmt::Result {
                  write!(f, "model buffer is too small")
              }
          }
          ''',
              '''impl fmt::Display for ModelBuildError {
              fn fmt(&self, f: &mut fmt::Formatter<'_>) -> fmt::Result {
                  write!(f, "model buffer is too small")
              }
          }

          #[cfg(feature = "std")]
          impl std::error::Error for ModelBuildError {}
          ''',
              1,
          )
          source = source.replace(
              '''impl From<loader::LoadError> for InferenceError {
          ''',
              '''#[cfg(feature = "std")]
          impl std::error::Error for InferenceError {}

          impl From<loader::LoadError> for InferenceError {
          ''',
              1,
          )
          source = source.replace(
              '''impl fmt::Display for ReceiptError {
              fn fmt(&self, f: &mut fmt::Formatter<'_>) -> fmt::Result {
                  write!(f, "receipt verification failed: {self:?}")
              }
          }
          ''',
              '''impl fmt::Display for ReceiptError {
              fn fmt(&self, f: &mut fmt::Formatter<'_>) -> fmt::Result {
                  write!(f, "receipt verification failed: {self:?}")
              }
          }

          #[cfg(feature = "std")]
          impl std::error::Error for ReceiptError {}
          ''',
              1,
          )
          path.write_text(source)
          Path(".github/workflows/wp6-error-traits.yml").unlink()
          PY

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sel4-microkernel/rpi4-llm/src/lib.rs .github/workflows/wp6-error-traits.yml
          git commit -m "wp6: implement std error traits for host verifier"
          git push origin HEAD:agent/wp6-verified-inference
