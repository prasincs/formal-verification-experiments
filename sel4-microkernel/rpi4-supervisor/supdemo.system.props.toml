version = 1

[[shared_only]]
pds = ["supervisor", "worker"]
regions = ["work_ring"]

[[exclusive]]
region = "rtc_regs"
pd = "supervisor"

[[no_device_mmio]]
pd = "worker"

[[only_channels]]
pd = "supervisor"
peers = ["worker"]

[[only_channels]]
pd = "worker"
peers = ["supervisor"]

[[dma_capable]]
pd = "supervisor"

[[restartable_ring]]
region = "work_ring"
lifecycle_pd = "supervisor"
endpoints = ["supervisor", "worker"]
